server {
    listen 80;
    server_name sales.axiosoft.co.kr;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name sales.axiosoft.co.kr;
    ssl_certificate /etc/letsencrypt/live/sales.axiosoft.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sales.axiosoft.co.kr/privkey.pem;
    client_max_body_size 20M;
    location / {
        proxy_pass http://mini-erp:18765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
